name: Release Charts

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Add Helm repositories
        run: |
          helm repo add trinodb https://trinodb.github.io/charts/
          helm repo add opstty https://opstty.github.io/charts/
          helm repo update

      - name: Run chart-releaser
        id: release
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: opstty
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Collect chart versions from master
        if: steps.release.outputs.changed_charts != ''
        id: versions
        run: |
          # Build a JSON map { "chart_name": {"version": "x", "app_version": "y", "description": "..."} }
          # while we're still on the master checkout (Chart.yaml files are present)
          python3 - <<'EOF'
          import re, json, os

          charts_raw = os.environ["CHANGED_CHARTS"]
          result = {}
          for chart_dir in charts_raw.split():
              chart_name = chart_dir.rstrip("/").split("/")[-1]
              chart_yaml_path = f"{chart_dir}/Chart.yaml"
              if not os.path.exists(chart_yaml_path):
                  print(f"Warning: {chart_yaml_path} not found, skipping")
                  continue
              with open(chart_yaml_path) as f:
                  cy = f.read()
              version = re.search(r"^version:\s*(.+)$", cy, re.M).group(1).strip()
              app_version = re.search(r'^appVersion:\s*["\']?(.+?)["\']?\s*$', cy, re.M).group(1).strip()
              desc_m = re.search(r'^description:\s*(.+)$', cy, re.M)
              description = desc_m.group(1).strip() if desc_m else chart_name
              result[chart_name] = {"version": version, "app_version": app_version, "description": description}
              print(f"Collected {chart_name}: {version} / {app_version}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"versions_json={json.dumps(result)}\n")
          EOF
        env:
          CHANGED_CHARTS: ${{ steps.release.outputs.changed_charts }}

      - name: Save chart READMEs from master
        if: steps.release.outputs.changed_charts != ''
        id: readmes
        run: |
          # Copy each changed chart's README.md to a temp dir before switching branches
          mkdir -p /tmp/chart-readmes
          for chart_dir in $CHANGED_CHARTS; do
            chart_name=$(basename "$chart_dir")
            if [ -f "$chart_dir/README.md" ]; then
              cp "$chart_dir/README.md" "/tmp/chart-readmes/${chart_name}.md"
              echo "Saved README for $chart_name"
            fi
          done
        env:
          CHANGED_CHARTS: ${{ steps.release.outputs.changed_charts }}

      - name: Update gh-pages (versions + chart pages)
        if: steps.release.outputs.changed_charts != ''
        run: |
          git fetch origin gh-pages
          git checkout gh-pages

          # --- Update version table in index.md (upsert: update existing rows, insert new ones) ---
          python3 - <<'EOF'
          import re, json, os

          versions = json.loads(os.environ["VERSIONS_JSON"])

          with open("index.md") as f:
              content = f.read()

          for chart_name, info in versions.items():
              version = info["version"]
              app_version = info["app_version"]
              description = info.get("description", chart_name)
              # Try to update an existing row first
              # Matches: | [chart_name](any_url) | any description | OLD_VER | OLD_APP_VER |
              pattern = rf'(\|\s*\[{re.escape(chart_name)}\]\([^)]+\)\s*\|[^|]+\|)[^|]+(\|)[^|]+(\|)'
              replacement = rf'\g<1> {version} \g<2> {app_version} \g<3>'
              new_content, n = re.subn(pattern, replacement, content)
              if n:
                  print(f"Updated {chart_name}: {version} / {app_version}")
                  content = new_content
              else:
                  # Row doesn't exist yet — insert a new row at the end of the table
                  table_end = re.search(r'(\|[^\n]+\|\n)(?!\|)', content)
                  if table_end:
                      insert_pos = table_end.end()
                      new_row = f"| [{chart_name}](charts/{chart_name}/) | {description} | {version} | {app_version} |\n"
                      content = content[:insert_pos] + new_row + content[insert_pos:]
                      print(f"Inserted new row for {chart_name}: {version} / {app_version}")
                  else:
                      print(f"Warning: could not locate table end for {chart_name} — skipping insert")

          with open("index.md", "w") as f:
              f.write(content)
          EOF

          # --- Copy chart READMEs as dedicated pages ---
          for readme in /tmp/chart-readmes/*.md; do
            [ -f "$readme" ] || continue
            chart_name=$(basename "$readme" .md)
            mkdir -p "charts/${chart_name}"
            {
              echo "---"
              echo "layout: default"
              echo "title: ${chart_name}"
              echo "---"
              echo ""
              cat "$readme"
            } > "charts/${chart_name}/index.md"
            echo "Published chart page: charts/${chart_name}/index.md"
          done

          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "No changes to gh-pages"
            exit 0
          fi

          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git add index.md charts/
          git commit -m "docs: update chart versions and chart pages"
          git push origin gh-pages
        env:
          VERSIONS_JSON: ${{ steps.versions.outputs.versions_json }}

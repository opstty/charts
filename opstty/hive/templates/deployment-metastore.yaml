{{- if .Values.metastore.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hive.fullname" . }}-metastore
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hive.labels" . | nindent 4 }}
    app.kubernetes.io/component: metastore
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.metastore.replicas | default .Values.replicas }}
  selector:
    matchLabels:
      {{- include "hive.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: metastore
  template:
    metadata:
      labels:
        {{- include "hive.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: metastore
    spec:
      {{- if (.Values.metastore.imagePullSecrets | default .Values.imagePullSecrets) }}
      imagePullSecrets:
        {{- toYaml (.Values.metastore.imagePullSecrets | default .Values.imagePullSecrets) | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "hive.serviceAccountName" . }}
      volumes:
        - name: hive-site-config
          configMap:
            name: {{ include "hive.fullname" . }}-hive-site
        - name: metastore-site-config
          configMap:
            name: {{ include "hive.fullname" . }}-metastore-site
        - name: credential-provider-volume
          emptyDir: {}
        {{- if .Values.metastore.extraVolumes }}
        {{- toYaml .Values.metastore.extraVolumes | nindent 8 }}
        {{- end }}
      initContainers:
        - name: 01-wait-for-db
          image: postgres:alpine
          env:
            - name: HMS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "hive.pgSecretName" . }}
                  key: {{ include "hive.pgSecretPasswordKey" . }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              export PGPASSWORD="$HMS_DB_PASSWORD"
              until pg_isready -h "{{ include "hive.pgHost" . }}" -p "{{ include "hive.pgPort" . }}" -U "{{ include "hive.pgUser" . }}"; do
                echo "Waiting for PostgreSQL..."
                sleep 5
              done
              echo "PostgreSQL is ready."
        - name: 02-setup-credential-provider
          image: {{ include "hive.componentImage" (dict "global" .Values.image "component" .Values.metastore.image "chart" .Chart) }}
          env:
            - name: HMS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "hive.pgSecretName" . }}
                  key: {{ include "hive.pgSecretPasswordKey" . }}
          volumeMounts:
            - name: credential-provider-volume
              mountPath: /opt/hive/secrets
          command: ["/bin/sh", "-c"]
          args:
            - |
              hadoop credential create javax.jdo.option.ConnectionPassword \
                -value ${HMS_DB_PASSWORD} \
                -provider jceks://file/opt/hive/secrets/hive.jceks
        {{- if .Values.metastore.initContainers }}
        {{- tpl (toYaml .Values.metastore.initContainers) . | nindent 8 }}
        {{- end }}
      containers:
        - name: metastore
          image: {{ include "hive.componentImage" (dict "global" .Values.image "component" .Values.metastore.image "chart" .Chart) }}
          imagePullPolicy: {{ .Values.metastore.image.pullPolicy | default .Values.image.pullPolicy }}
          env:
            - name: SERVICE_NAME
              value: metastore
            - name: DB_DRIVER
              value: "postgres"
            - name: HMS_DB_HOST
              value: {{ include "hive.pgHost" . | quote }}
            - name: HMS_DB_PORT
              value: {{ include "hive.pgPort" . | quote }}
            - name: HMS_DB_USER
              value: {{ include "hive.pgUser" . | quote }}
            - name: SERVICE_OPTS
              value: >
                -Xmx2G
                -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
                -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://{{ include "hive.pgHost" . }}:{{ include "hive.pgPort" . }}/{{ include "hive.pgDatabase" . }}
                -Djavax.jdo.option.ConnectionUserName={{ include "hive.pgUser" . }}
            {{- $envYaml := include "hive.mergeEnv" (dict "defaultEnv" .Values.env "specificEnv" .Values.metastore.env) -}}
            {{- if $envYaml }}
            {{- $envYaml | nindent 12 }}
            {{- end }}
          {{- if .Values.metastore.envFrom }}
          envFrom:
            {{- toYaml .Values.metastore.envFrom | nindent 12 }}
          {{- end }}
          ports:
            - name: thrift
              containerPort: {{ .Values.metastore.service.port }}
              protocol: TCP
          volumeMounts:
            - name: hive-site-config
              mountPath: /opt/hive/conf/hive-site.xml
              subPath: hive-site.xml
            - name: metastore-site-config
              mountPath: /opt/hive/conf/metastore-site.xml
              subPath: metastore-site.xml
            - name: credential-provider-volume
              mountPath: /opt/hive/secrets
            {{- if .Values.metastore.extraVolumeMounts }}
            {{- toYaml .Values.metastore.extraVolumeMounts | nindent 12 }}
            {{- end }}
          {{- with .Values.metastore.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            tcpSocket:
              port: {{ .Values.metastore.service.port }}
            failureThreshold: {{ .Values.metastore.startupProbe.failureThreshold | default 30 }}
            periodSeconds: {{ .Values.metastore.startupProbe.periodSeconds | default 10 }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.metastore.service.port }}
            initialDelaySeconds: {{ .Values.metastore.livenessProbe.initialDelaySeconds | default 15 }}
            periodSeconds: {{ .Values.metastore.livenessProbe.periodSeconds | default 20 }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.metastore.service.port }}
            initialDelaySeconds: {{ .Values.metastore.readinessProbe.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.metastore.readinessProbe.periodSeconds | default 10 }}
{{- end -}}

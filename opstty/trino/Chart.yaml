kubeVersion: ">=1.23.0"
description: A Helm chart for Trino — wraps the official trinodb/trino subchart with operational templates for certificates, ingress, table registration, and Superset integration.
type: application
keywords:
  - trino
  - sql
  - query-engine
  - data-lake
home: https://trino.io
icon: https://trino.io/assets/images/trino-og.png
appVersion: "481"
deprecated: false
dependencies:
  - name: trino
    version: "1.42.1"
    repository: "https://trinodb.github.io/charts/"
  - name: hive
    version: "0.1.x"
    repository: "https://opstty.github.io/charts/"
    condition: hive.enabled

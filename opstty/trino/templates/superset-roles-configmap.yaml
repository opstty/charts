{{- if .Values.superset.roles.configmap.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "trino.fullname" . }}-superset-roles-configmap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trino.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  roles.json: |
{{- .Values.superset.roles.configmap.data | nindent 4 }}
{{- end }}
